<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthShare — Login / Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  /* ── Role hint badge ── */
  .role-hint {
    display: flex; align-items: flex-start; gap: 10px;
    background: #f0f4ff; border: 1px solid #c7d4f5;
    border-radius: 8px; padding: 10px 12px;
    margin-bottom: 14px; font-size: 12px; line-height: 1.5;
    color: #3a4a7a;
  }
  .role-hint-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .role-hint strong { display: block; margin-bottom: 2px; font-size: 12px; }

  /* ── Debug panel (shown on PHP errors) ── */
  .debug-box {
    background: #fff8e1; border: 1px solid #f0c040;
    border-radius: 8px; padding: 10px 12px;
    font-size: 11px; font-family: monospace;
    color: #5a4000; margin-top: 8px; white-space: pre-wrap;
    word-break: break-all;
  }

  /* ── Success card ── */
  .hid-result {
    background: #edfaf3; border: 1px solid #6fcf97;
    border-radius: 10px; padding: 18px 16px; margin-top: 14px;
  }
  .hid-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: #2d7a4f; margin-bottom: 6px; }
  .hid-value { font-size: 1.5rem; font-weight: 700; letter-spacing: .08em;
    color: #1a5c38; margin-bottom: 8px; }
  .hid-note  { font-size: 12px; color: #3a7a56; line-height: 1.5; }
</style>
</head>
<body>

<section class="screen active" id="screen-login">
  <div class="auth-wrap">
    <div class="auth-card">

      <div class="brand">
        <div class="brand-mark">H+</div>
        <div class="brand-name">HealthShare</div>
      </div>
      <p class="auth-tagline">Kenya national health records portal</p>

      <div class="seg-toggle" role="tablist">
        <button class="seg-btn active" data-pane="pane-login" role="tab">Log in</button>
      </div>

      <!-- ══════════════════════════════════
           LOGIN PANE
      ══════════════════════════════════ -->
      <div class="auth-pane active" id="pane-login">

        <label class="field-label" for="login-role">I am a…</label>
        <select id="login-role" class="field-input">
          <option value="patient">Patient</option>
          <option value="doctor">Doctor</option>
          <option value="hospital-admin">Hospital admin</option>
          <option value="system-admin">System admin</option>
          <option value="emergency">Emergency personnel</option>
        </select>

        <!-- Dynamic hint per role -->
        <div class="role-hint" id="login-role-hint">
          <span class="role-hint-icon">🪪</span>
          <div id="login-hint-text">
            <strong>Patient login</strong>
            Use the Health ID you received when you registered (e.g. KE-HID-08213).
          </div>
        </div>

        <label class="field-label" for="login-id">
          <span id="login-id-label">Health ID</span>
        </label>
        <input class="field-input mono" id="login-id" type="text"
               placeholder="KE-HID-XXXXX" autocomplete="username" spellcheck="false">

        <label class="field-label" for="login-pass">Password</label>
        <input class="field-input" id="login-pass" type="password"
               placeholder="••••••••" autocomplete="current-password">

        <p class="auth-error" id="login-error" hidden></p>
        <div class="debug-box" id="login-debug" hidden></div>

        <button class="btn-primary full" id="btn-login">Log in</button>


      </div>

      <!-- ══════════════════════════════════
           REGISTER PANE  (replaced — patients registered by hospital staff)
      ══════════════════════════════════ -->
      <div class="auth-pane" id="pane-register">
        <div class="role-hint">
          <span class="role-hint-icon">🏥</span>
          <div>
            <strong>Patient registration</strong>
            Patients are registered by hospital staff during their first hospital visit.
          </div>
        </div>
        <p class="auth-switch">
          Already registered? <a href="#" data-pane="pane-login" class="link-switch">Log in</a>
        </p>
      </div>

    </div><!-- /auth-card -->
  </div>
</section>

<script src="app.js?v=8"></script>
</body>
</html>
